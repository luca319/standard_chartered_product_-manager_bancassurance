        q: "How do you approach building a business case for a new product?",

Customer: Who is this for? What unmet need? What competitor product already serves it? I won't move past this layer unless I can describe the target segment in plain language and quantify the addressable opportunity.

Product: What's the proposition — coverage, premium structure, riders, exclusions? What's the unit economics — pricing assumptions, expected persistency, claim ratio, commission structure?

Distribution: Which channel sells this — Premier RMs, Priority RMs, Mass Affluent, Saadiq RMs, digital? What's the sales effort and conversion rate? Do we need new training, new collateral, system changes?

        a: `Two honest answers.

Plan B is to stay at AEON for now. I'm not desperate to leave — I'm selective about moving. AEON has been good to me, and the broker-side learning continues to compound.

Beyond that, I'm in early conversations with one other bank for a similar bancassurance role, but I'd want to be clear: my preference is here. The Prudential partnership, the Saadiq exposure, the Wealth and Retail Banking investment commitment from the group — that's the combination I'm looking for, and I don't see it replicated anywhere else in the Malaysian market right now.

So Plan B exists, but Plan A is this role. I'd rather hear from you that you're seriously considering me than hear from me that I have other options.`,
        why: "Avoids both desperation and arrogance. Signals you have options without bluffing. Closes by handing the ball back to them.",
        tip: "Don't name specific competitor banks even if asked. 'Another major Malaysian bank with a similar bancassurance role' is enough."
      },
      {
        q: "You have CFP and 18 years. Why not run your own advisory practice or move to an insurer-side senior role?",
        a: `I've thought about both.

The advisory practice route — I respect financial planners who go independent, but the CFP for me has always been a credential that adds depth to my product work, not a path to running my own book. I'm a product person, not a sales person. My energy goes into building things — products, propositions, frameworks — not into managing client portfolios.

The insurer-side route is more interesting and I have considered it. The reason I'm here, on the bank side rather than insurer side, is that bancassurance is fundamentally a distribution game. The bank owns the customer. The bank decides which products get shelf space, which segments get prioritised, which campaigns get budget. That's where the leverage is. Sitting on the insurer side, I'd be one of several partners trying to win shelf space — interesting work, but less leverage than being the one deciding what gets on the shelf.

This role gives me both — distribution leverage on the bank side, and a serious 25-year partnership to manage on the insurer side. That's the best of both worlds for someone with my background.`,
        why: "Shows you've thought through career options seriously, not drifted into this application. The 'where the leverage is' framing signals strategic thinking.",
        tip: "Don't badmouth advisory or insurer-side careers. Be respectful — you might end up there one day."
      }
    ]
  },
  {
    id: 'tier4', label: 'Tier 4', title: 'Scenarios', icon: '🧩',
    accent: 'from-blue-500 to-cyan-500',
    questions: [
      {
        q: "Imagine launching a new regular-premium life insurance product through our branches. Walk me through pricing, segmentation, and sales enablement.",
        critical: true,
        a: `I'll take this as a hypothetical regular-premium ILP, similar in shape to PRUSignature Infinite, launched through SC Malaysia's WRB distribution.

Segmentation first. I'd start by mapping the product to a primary segment — let's say emerging affluent and Priority customers between 30 and 50, in their wealth accumulation phase, with protection gaps. Secondary segment: Premier customers using it as a wealth and legacy planning tool. Saadiq variant would target the Bumi affluent segment in parallel, designed for Shariah equivalence on contribution structure and Hibah nomination.

Pricing. Sum-assured tiers, contribution bands aligned to typical disposable income for the segment. Sensitivity testing on persistency — a 5% drop in 13-month persistency hits IRR materially, so pricing must be sustainable even under moderate persistency stress. Charge structure transparent enough to clear conduct risk review at NPAP.

Sales enablement. Five components: an RM-facing product training pack that explains the product as a needs-based solution, not a sales pitch; a customer-facing needs analysis tool linking protection gap to product recommendation; a digital quote-and-illustration journey on SC Mobile; commission and incentive structure aligned to persistency (clawback for early lapse); and a launch campaign with co-marketing fund from the insurance partner.

Go-to-market. Soft launch with two Priority branches for two weeks. Tweak based on RM feedback and customer objections. Full rollout in month two. First 90-day review on conversion, sum assured per policy, persistency leading indicator.

The discipline I'd hold to: launch the smaller version that's right, not the bigger version that's almost-right.`,
        why: "Demonstrates real product-management muscle. Specific to SC's distribution architecture. Closes with a maturity statement.",
        tip: "Be ready for 'how would you price differently if IRR target was 18% vs 12%' — answer: tighter commission, leaner illustration, segment focus on lower-acquisition-cost channels."
      },
      {
        q: "Branch RMs are pushing back on a Takaful launch — they say commission doesn't motivate them vs conventional. How do you resolve this?",
        a: `This is a real-world scenario I'd take seriously, not dismiss. RM motivation drives sell-through, and if the frontline doesn't pitch the product, the launch dies regardless of how good the proposition is.

I'd work three angles in parallel.

First, validate the complaint with data. Is the commission actually lower, or perceived as lower because the sale cycle is longer? Pull the comparable Maybank Etiqa Takaful and CIMB Sun Life Takaful commission structures. If our commission is genuinely below market, that's a partner conversation — Prudential BSN Takaful needs to know we have a competitive friction point.

Second, look at non-commission levers. Often the issue isn't pure commission — it's ease of sale. Is the illustration tool slower for Takaful? Is the underwriting turnaround longer? Are the product features harder to explain? If we fix the friction, we may not need to touch commission at all.

Third, segment the RM base. Not every RM sells Takaful. The Saadiq RMs and a subset of conventional RMs serving Bumi clients are the natural distribution. I'd run a targeted incentive — a launch booster for those RMs specifically — rather than restructuring the whole commission grid, which would be expensive and create unintended consequences in conventional sales.

The principle: never solve an RM problem by throwing more money at it without first checking whether the problem is actually motivation, or actually friction.`,
        why: "Shows you don't panic-solve. Shows commercial sense (don't restructure commission grids lightly). Specific to SC Saadiq context.",
        tip: "If asked 'what if it really is commission?' — say: 'Then I'd build a proper case for the partner with volume projections, take it to GPC, and renegotiate. But data first.'"
      },
      {
        q: "Choose between a high-margin product with limited demand vs lower-margin with strong demand and strategic fit. How do you decide?",
        a: `I'd decide based on three filters, in this order: strategic fit, scalability of demand, and margin.

Strategic fit comes first. If a product strengthens our position with the affluent segment, deepens the Prudential partnership, or fills a Saadiq Takaful gap that aligns with where the bank is investing — that matters more than unit margin. Standard Chartered has explicitly chosen to invest $1.5 billion globally in WRB for cross-border affluent capability. Products that fit that thesis are worth more than their direct P&L suggests because they pull through related revenue — wealth solutions, deposits, cards.

Second, scalability of demand. A high-margin product with limited demand has a ceiling. A lower-margin product with strong demand has compounding potential — every customer it brings in is a customer for cross-sell, retention, and lifetime value. I'd model both five years out, not one year out.

Third, margin. Margin matters, but it's the third filter, not the first. A product launched purely for margin tends to fail because it's not solving a real customer problem and Distribution doesn't get behind it.

In the scenario you described, my default would be the lower-margin, higher-demand product — assuming strategic fit is genuine. But I'd ask: can we engineer the high-margin product to have higher demand through positioning or distribution? If yes, we may not have to choose.`,
        why: "Demonstrates senior product judgment — strategic fit before margin, lifetime value over unit margin. Ties to SC group strategy. Refuses the false binary at the end.",
        tip: "The 'refuse the false binary' close is a strong move at this seniority level. Use it when you can."
      }
    ]
  },
  {
    id: 'tier5', label: 'Tier 5', title: 'Ask Them', icon: '❓',
    accent: 'from-emerald-500 to-teal-500',
    isAskThem: true,
    questions: [
      { q: "What does success look like for this role in the first 12 months — both quantitatively and qualitatively?" },
      { q: "How does SC's bancassurance strategy in Malaysia differ from the regional or group-level strategy? Where does Malaysia fit in the broader Asia footprint?" },
      { q: "Beyond the Prudential partnership, is the partner mix evolving? Are there active discussions to bring in new providers in any segment?" },
      { q: "What's the current split between conventional and Saadiq bancassurance, and where do you see the growth coming from in the next two years?" },
      { q: "What are the biggest challenges the bancassurance team is facing right now — product gaps, distribution capacity, regulatory shifts, or something else?" },
      { q: "How would you describe the working relationship between Product, Distribution, and Risk/Compliance here? Where does friction usually show up?" }
    ]
  }
];

// ============== APP ==============
const STORAGE_PREFIX = 'stanchart';
const totalQuestions = TIERS.filter(t => !t.isAskThem).reduce((sum, t) => sum + t.questions.length, 0);

function App() {
  const [activeTier, setActiveTier] = useState('facts');
  const [openQ, setOpenQ] = useState(null);
  const [memorized, setMemorized] = useState({});
  const [darkMode, setDarkMode] = useState(false);
  const [factsRevealed, setFactsRevealed] = useState({});

  useEffect(() => {
    try {
      const m = JSON.parse(localStorage.getItem(`${STORAGE_PREFIX}_memorized`) || '{}');
      const d = localStorage.getItem(`${STORAGE_PREFIX}_dark`) === 'true';
      const f = JSON.parse(localStorage.getItem(`${STORAGE_PREFIX}_facts`) || '{}');
      setMemorized(m); setDarkMode(d); setFactsRevealed(f);
      if (d) document.documentElement.classList.add('dark');
    } catch (e) {}
  }, []);

  const toggleMemorized = (id) => {
    const next = { ...memorized, [id]: !memorized[id] };
    setMemorized(next);
    try { localStorage.setItem(`${STORAGE_PREFIX}_memorized`, JSON.stringify(next)); } catch (e) {}
  };

  const toggleFact = (i) => {
    const next = { ...factsRevealed, [i]: !factsRevealed[i] };
    setFactsRevealed(next);
    try { localStorage.setItem(`${STORAGE_PREFIX}_facts`, JSON.stringify(next)); } catch (e) {}
  };

  const toggleDarkMode = () => {
    const next = !darkMode;
    setDarkMode(next);
    if (next) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    try { localStorage.setItem(`${STORAGE_PREFIX}_dark`, String(next)); } catch (e) {}
  };

  const resetProgress = () => {
    if (confirm('Reset all memorization progress?')) {
      setMemorized({}); setFactsRevealed({});
      try {
        localStorage.removeItem(`${STORAGE_PREFIX}_memorized`);
        localStorage.removeItem(`${STORAGE_PREFIX}_facts`);
      } catch (e) {}
    }
  };

  const memorizedCount = Object.values(memorized).filter(Boolean).length;
  const progressPct = Math.round((memorizedCount / totalQuestions) * 100);

  const navItems = [
    { id: 'facts', label: 'Facts', icon: '🏛️' },
    ...TIERS.map(t => ({ id: t.id, label: t.label, icon: t.icon })),
    { id: 'killer', label: 'Killer', icon: '✨' }
  ];

  return (
    <div>
      {/* HEADER */}
      <header className="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div className="max-w-2xl mx-auto px-4 py-3">
          <div className="flex justify-between items-start">
            <div>
              <h1 className="text-lg font-bold tracking-tight">Standard Chartered Interview Prep</h1>
              <p className="text-xs text-slate-500 dark:text-slate-400">Product Manager, Bancassurance</p>
            </div>
            <div className="flex gap-1">
              <button onClick={resetProgress} className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition" aria-label="Reset progress">
                <RotateCcw className="w-4 h-4" />
              </button>
              <button onClick={toggleDarkMode} className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition" aria-label="Toggle dark mode">
                {darkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
              </button>
            </div>
          </div>
          <div className="flex items-center gap-2 mt-3">
            <div className="flex-1 h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-emerald-500 to-teal-500 transition-all duration-500" style={{ width: `${progressPct}%` }}></div>
            </div>
            <span className="text-xs font-semibold text-slate-600 dark:text-slate-400 tabular-nums min-w-[70px] text-right">{memorizedCount}/{totalQuestions} ({progressPct}%)</span>
          </div>
        </div>
        <div className="border-t border-slate-100 dark:border-slate-800 overflow-x-auto scrollbar-hide">
          <div className="max-w-2xl mx-auto px-2 flex gap-1">
            {navItems.map(item => (
              <button
                key={item.id}
                onClick={() => { setActiveTier(item.id); setOpenQ(null); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                className={`flex items-center gap-1.5 px-3 py-2.5 text-sm font-medium whitespace-nowrap border-b-2 transition ${activeTier === item.id ? 'border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}
              >
                <span>{item.icon}</span>{item.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* MAIN */}
      <main className="max-w-2xl mx-auto px-4 py-5 pb-24">
        {activeTier === 'facts' && (
          <div className="space-y-4">
            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg">
              <div className="flex items-start gap-3">
                <Building2 size={24} />
                <div>
                  <h2 className="text-xl font-bold leading-tight">Key Facts to Memorize</h2>
                  <p className="text-blue-100 text-sm mt-1">Tap to reveal. Drop these naturally into the conversation.</p>
                </div>
              </div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
              {KEY_FACTS.map((fact, i) => (
                <button
                  key={i}
                  onClick={() => toggleFact(i)}
                  className="text-left p-3.5 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-md transition-all active:scale-[0.98]"
                >
                  <div className="flex items-start gap-2.5">
                    <span className="text-2xl">{fact.icon}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-0.5">{fact.label}</div>
                      <div className={`text-sm font-medium leading-snug transition-all ${!factsRevealed[i] ? 'blur-sm select-none' : ''}`}>{fact.value}</div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
            <div className="bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 rounded-xl p-4 mt-4">
              <div className="flex gap-2.5">
                <Lightbulb size={20} className="text-amber-600 dark:text-amber-400 flex-shrink-0 mt-0.5" />
                <div className="text-sm text-amber-900 dark:text-amber-200 leading-relaxed">
                  <strong>Study tip:</strong> Tap each card to reveal — then test yourself by tapping it again to blur. Aim for &lt;2 seconds recall on every fact before the interview.
                </div>
              </div>
            </div>
          </div>
        )}

        {TIERS.map(tier => activeTier === tier.id && (
          <div key={tier.id} className="space-y-4">
            <div className={`bg-gradient-to-br ${tier.accent} rounded-2xl p-5 text-white shadow-lg`}>
              <div className="flex items-start gap-3">
                <span className="text-3xl">{tier.icon}</span>
                <div>
                  <div className="text-sm font-medium text-white/80">{tier.label}</div>
                  <h2 className="text-xl font-bold leading-tight">{tier.title}</h2>
                </div>
              </div>
              <p className="text-white/90 text-sm mt-2">
                {tier.id === 'tier1' && "You WILL face these. Master them first."}
                {tier.id === 'tier2' && "Very probable. Have answers ready."}
                {tier.id === 'tier3' && "Tougher questions. Stay composed."}
                {tier.id === 'tier4' && "Practical tests of your thinking."}
                {tier.isAskThem && "Strong candidates ask strong questions. Pick 2-3 to ask."}
              </p>
            </div>

            <div className="space-y-3">
              {tier.questions.map((qa, idx) => {
                const id = `${tier.id}-${idx}`;
                const isOpen = openQ === id;
                const isMem = memorized[id];

                if (tier.isAskThem) {
                  return (
                    <div key={idx} className="bg-white dark:bg-slate-900 rounded-xl p-4 border border-emerald-200 dark:border-emerald-800 shadow-sm">
                      <div className="flex gap-3">
                        <div className="w-7 h-7 rounded-full bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-700 dark:text-emerald-300 font-bold text-sm flex-shrink-0">{idx + 1}</div>
                        <p className="text-[15px] leading-relaxed font-medium flex-1">{qa.q}</p>
                      </div>
                    </div>
                  );
                }

                return (
                  <div key={idx} className={`bg-white dark:bg-slate-900 rounded-xl border-2 shadow-sm transition-all ${isMem ? 'border-emerald-300 dark:border-emerald-700 bg-emerald-50/50 dark:bg-emerald-950/20' : 'border-slate-200 dark:border-slate-800'}`}>
                    <button
                      onClick={() => setOpenQ(isOpen ? null : id)}
                      className="w-full text-left p-4 flex items-start gap-3"
                    >
                      <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${qa.critical ? 'bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 ring-2 ring-red-400' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>{idx + 1}</div>
                      <div className="flex-1 min-w-0">
                        {qa.critical && (
                          <div className="inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider text-red-600 dark:text-red-400 mb-1">
                            <AlertTriangle size={12} />Critical Question
                          </div>
                        )}
                        <div className="text-[15px] leading-relaxed font-semibold pr-2">{qa.q}</div>
                      </div>
                      <ChevronDown size={20} className={`w-5 h-5 text-slate-400 flex-shrink-0 mt-1 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </button>

                    {isOpen && (
                      <div className="px-4 pb-4 space-y-3 animate-fadeIn">
                        <div className="pl-10">
                          <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-4 border-l-4 border-blue-500">
                            <div className="flex items-center gap-1.5 mb-2">
                              <MessageSquare size={14} className="text-blue-600 dark:text-blue-400" />
                              <span className="text-[11px] font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400">Model Answer</span>
                            </div>
                            <div className="text-[15px] leading-[1.7] text-slate-800 dark:text-slate-200 whitespace-pre-line">{qa.a}</div>
                          </div>

                          {qa.tip && (
                            <div className="mt-3 bg-amber-50 dark:bg-amber-950/30 rounded-lg p-3 border-l-4 border-amber-500">
                              <div className="flex items-center gap-1.5 mb-1">
                                <Lightbulb size={16} className="text-amber-700 dark:text-amber-400" />
                                <span className="text-[11px] font-bold uppercase tracking-wider text-amber-700 dark:text-amber-400">Tip</span>
                              </div>
                              <div className="text-sm text-amber-900 dark:text-amber-200 leading-relaxed mt-0.5">{qa.tip}</div>
                            </div>
                          )}

                          {qa.why && (
                            <div className="mt-3 bg-emerald-50 dark:bg-emerald-950/30 rounded-lg p-3 border-l-4 border-emerald-500">
                              <div className="flex items-center gap-1.5 mb-1">
                                <Award size={16} className="text-emerald-700 dark:text-emerald-400" />
                                <span className="text-[11px] font-bold uppercase tracking-wider text-emerald-700 dark:text-emerald-400">Why It Works</span>
                              </div>
                              <div className="text-sm text-emerald-900 dark:text-emerald-200 leading-relaxed mt-0.5">{qa.why}</div>
                            </div>
                          )}

                          <button
                            onClick={() => toggleMemorized(id)}
                            className={`mt-3 w-full flex items-center justify-center gap-2 py-2.5 rounded-lg font-semibold text-sm transition-all ${isMem ? 'bg-emerald-600 hover:bg-emerald-700 text-white' : 'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300'}`}
                          >
                            {isMem ? <><CheckCircle2 size={16} />Memorized — tap to unmark</> : <><Circle size={16} />Mark as memorized</>}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}

        {activeTier === 'killer' && (
          <div className="space-y-4">
            <div className="bg-gradient-to-br from-violet-600 to-fuchsia-600 rounded-2xl p-5 text-white shadow-lg">
              <div className="flex items-start gap-3">
                <Sparkles size={24} />
                <div>
                  <h2 className="text-xl font-bold leading-tight">Your 3 Killer Messages</h2>
                  <p className="text-violet-100 text-sm mt-1">Weave these into the conversation. If you remember nothing else, remember these.</p>
                </div>
              </div>
            </div>

            <div className="space-y-3">
              {KILLER_MESSAGES.map((msg, i) => (
                <div key={i} className="bg-white dark:bg-slate-900 rounded-xl p-4 border-2 border-violet-200 dark:border-violet-800 shadow-sm">
                  <div className="flex gap-3 items-start">
                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-white font-bold text-sm shadow flex-shrink-0">{i + 1}</div>
                    <p className="text-[15px] leading-relaxed font-medium flex-1 italic">"{msg}"</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-5 text-white mt-6">
              <div className="font-bold text-lg mb-3 flex items-center gap-2">
                <Target size={20} />Final Reminders
              </div>
              <ul className="space-y-2.5 text-sm leading-relaxed">
                <li className="flex gap-2"><span className="text-emerald-400">✓</span> Be confident — you've earned the seat.</li>
                <li className="flex gap-2"><span className="text-emerald-400">✓</span> Drop names naturally: Bill Winters, Harmander Mahal, Mushahid Syed, Bilal Parvaiz.</li>
                <li className="flex gap-2"><span className="text-emerald-400">✓</span> Reference the Prudential 25-year partnership and $1.5B WRB investment.</li>
                <li className="flex gap-2"><span className="text-emerald-400">✓</span> Pause two seconds before tough questions — silence is fine.</li>
                <li className="flex gap-2"><span className="text-amber-400">⚠</span> Don't trash AEON when explaining why you're leaving — they've been good to you.</li>
                <li className="flex gap-2"><span className="text-amber-400">⚠</span> Don't undersell yourself on salary — RM 14-16K is your real target, not RM 13K.</li>
              </ul>
              <div className="mt-5 pt-4 border-t border-white/10 text-center">
                <p className="text-2xl font-bold bg-gradient-to-r from-amber-300 to-yellow-300 bg-clip-text text-transparent">加油 Yoke Keng!</p>
                <p className="text-sm text-slate-300 mt-1">You've got this. 🚀</p>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
